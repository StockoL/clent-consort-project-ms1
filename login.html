<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Member Login - The Clent Consort</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header id="top">
      <a href="index.html" class="logo-link">
        <img
          src="assets/images/clent-consort-logo.png"
          alt="Clent Consort Icon"
          width="50"
          height="50"
        />
        <span class="brand-name">The Clent Consort</span>
      </a>
      <nav aria-label="Main Navigation">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="events.html">Events</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>
    <main class="l-center">
      <div class="login-wrapper l-stack l-stack--large">
        <nav class="login-nav">
          <a href="index.html" class="back-link">
            <span aria-hidden="true">&larr;</span> Back to Public Site
          </a>
        </nav>

        <section class="box invert l-stack">
          <div class="l-stack l-stack--small login-header">
            <h1>Member Login</h1>
            <p>Access to rehearsal scores, schedules, and recordings.</p>
          </div>

          <form action="members.html" method="GET" class="l-stack">
            <div class="form-group l-stack l-stack--small">
              <label for="user">Username</label>
              <input
                type="text"
                id="user"
                name="username"
                placeholder="e.g. Bass1"
                required
                autocomplete="username"
              />
            </div>

            <div class="form-group l-stack l-stack--small">
              <label for="pass">Skeleton Key</label>
              <input
                type="password"
                id="pass"
                name="password"
                pattern="Clent2026"
                title="Invalid Key. Hint: The name of the choir + the current year."
                placeholder="••••••••"
                required
                autocomplete="current-password"
              />
            </div>

            <button type="submit" class="cta-button">
              Enter Resource Area
            </button>
          </form>

          <p class="login-footer-text">
            Forgot the key? Contact the Secretary.
          </p>
        </section>
      </div>
    </main>
    <footer>
      <nav aria-label="Footer Navigation">
        <ul>
          <li><a href="login.html">Member Resource Area</a></li>
          <li><a href="#top">Back to Top</a></li>
        </ul>
      </nav>
      <p>&copy; 2026 The Clent Consort. All rights reserved.</p>
    </footer>
  </body>
</html>
